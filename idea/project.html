    --amber:#ffb454; --amber-dim:#a67733; --teal:#7fdbca; --violet:#c9a6ff; --red:#ff8a8a;
    --radius:2px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  body{background:var(--bg); color:var(--text); font-family:'Space Grotesk', sans-serif; line-height:1.6; -webkit-font-smoothing:antialiased;}
  ::selection{background:var(--amber); color:#0b0a08;}
  .mono{font-family:'JetBrains Mono', monospace;}
  a{color:inherit; text-decoration:none;}
  button{font:inherit; cursor:pointer; background:none; color:inherit;}
  ::-webkit-scrollbar{width:10px;}
  ::-webkit-scrollbar-track{background:var(--bg);}
  ::-webkit-scrollbar-thumb{background:var(--panel-2); border:1px solid var(--border);}
  body::before{
    content:""; position:fixed; inset:0; pointer-events:none; z-index:1;
    background-image: repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0px, rgba(255,255,255,0.012) 1px, transparent 1px, transparent 3px);
    mix-blend-mode:overlay;
  }
  .wrap{max-width:820px; margin:0 auto; padding:0 24px;}

  header{position:sticky; top:0; z-index:10; background:rgba(11,10,8,0.88); backdrop-filter:blur(8px); border-bottom:1px solid var(--border);}
  .nav{display:flex; align-items:center; justify-content:space-between; padding:16px 24px; max-width:820px; margin:0 auto;}
  .nav .prompt{font-size:14px; color:var(--amber);}
  .nav .prompt .path{color:var(--muted);}
  .nav ul{list-style:none; display:flex; gap:22px; font-size:13px;}
  .nav ul a{color:var(--muted); transition:color .15s;}
  .nav ul a:hover{color:var(--amber);}
  .nav ul a::before{content:"./"; color:var(--dim);}

  .back{display:inline-block; font-size:13px; color:var(--muted); margin:40px 0 28px;}
  .back:hover{color:var(--amber);}

  .proj-head{border-bottom:1px solid var(--border); padding-bottom:28px; margin-bottom:36px;}
  .eyebrow{font-size:12.5px; color:var(--teal); letter-spacing:.04em; margin-bottom:14px;}
  h1{font-size:38px; font-weight:700; letter-spacing:-.02em; margin-bottom:12px;}
  .subtitle{font-size:16px; color:var(--muted); max-width:600px; margin-bottom:20px;}
  .tags{display:flex; gap:8px; flex-wrap:wrap;}
  .tags span{font-size:11.5px; color:var(--dim); border:1px solid var(--border); padding:3px 9px; border-radius:20px;}

  article{font-size:16px; color:var(--text);}
  article h1, article h2, article h3{color:var(--amber); font-weight:600; margin:32px 0 14px; letter-spacing:-.01em;}
  article h2{font-size:21px;} article h3{font-size:18px;}
  article p{color:var(--text); opacity:.92; margin-bottom:16px; max-width:700px;}
  article a{color:var(--teal); border-bottom:1px solid var(--teal);}
  article ul, article ol{margin:0 0 16px 22px; opacity:.92;}
  article li{margin-bottom:6px;}
  article blockquote{border-left:2px solid var(--amber-dim); margin:20px 0; padding:6px 20px; color:var(--muted); font-style:italic;}
  article :not(pre) > code{
    font-family:'JetBrains Mono', monospace; font-size:13.5px; background:var(--panel-2);
    border:1px solid var(--border); border-radius:3px; padding:2px 6px; color:var(--teal);
  }
  article hr{border:none; border-top:1px solid var(--border); margin:32px 0;}

  .code-block{border:1px solid var(--border); border-radius:var(--radius); background:var(--panel); margin:20px 0; overflow:hidden;}
  .code-head{display:flex; justify-content:space-between; align-items:center; padding:8px 14px; border-bottom:1px solid var(--border); background:var(--panel-2);}
  .code-lang{font-size:11.5px; color:var(--dim); text-transform:lowercase; letter-spacing:.03em;}
  .copy-btn{font-family:'JetBrains Mono', monospace; font-size:11px; color:var(--muted); border:1px solid var(--border); padding:3px 9px; border-radius:var(--radius);}
  .copy-btn:hover{color:var(--amber); border-color:var(--amber-dim);}
  .copy-btn.copied{color:var(--teal); border-color:var(--teal);}
  pre{overflow-x:auto; padding:16px 20px; margin:0;}
  pre code.hljs{background:none; font-family:'JetBrains Mono', monospace; font-size:13.5px; padding:0; line-height:1.55;}
  .hljs-comment,.hljs-quote{color:var(--dim); font-style:italic;}
  .hljs-keyword,.hljs-selector-tag,.hljs-literal,.hljs-doctag{color:var(--amber);}
  .hljs-string,.hljs-attr,.hljs-regexp{color:var(--teal);}
  .hljs-number,.hljs-symbol{color:var(--violet);}
  .hljs-title,.hljs-title.function_,.hljs-title.class_{color:#ffd699;}
  .hljs-variable,.hljs-template-variable,.hljs-name{color:var(--text);}
  .hljs-type,.hljs-built_in,.hljs-class{color:var(--violet);}
  .hljs-meta{color:var(--dim);}

  /* ---- reactions ---- */
  .reactions{
    display:flex; align-items:center; gap:12px; margin:44px 0 8px; padding:18px 22px;
    border:1px solid var(--border); border-radius:var(--radius); background:var(--panel);
  }
  .react-btn{
    display:flex; align-items:center; gap:8px; font-family:'JetBrains Mono', monospace; font-size:13px;
    color:var(--muted); border:1px solid var(--border); padding:8px 16px; border-radius:20px; transition:all .15s;
  }
  .react-btn svg{width:15px; height:15px;}
  .react-btn:hover{border-color:var(--muted); color:var(--text);}
  .react-btn.like.active{color:var(--teal); border-color:var(--teal); background:rgba(127,219,202,0.08);}
  .react-btn.dislike.active{color:var(--red); border-color:var(--red); background:rgba(255,138,138,0.08);}
  .react-hint{margin-left:auto; font-size:11.5px; color:var(--dim);}

  /* ---- comments ---- */
  .comments{margin-top:56px;}
  .comments-head{display:flex; align-items:baseline; gap:10px; margin-bottom:22px;}
  .comments-head h2{font-size:15px; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); font-weight:600;}
  .comments-head .count{color:var(--dim); font-size:13px;}

  .comment-form{border:1px solid var(--border); background:var(--panel); border-radius:var(--radius); padding:20px 22px; margin-bottom:28px;}
  .field{margin-bottom:14px;}
  .field label{display:block; font-size:11px; color:var(--dim); margin-bottom:6px; text-transform:uppercase; letter-spacing:.06em;}
  .field input, .field textarea{
    width:100%; background:var(--panel-2); border:1px solid var(--border); border-radius:var(--radius);
    color:var(--text); font-family:'Space Grotesk', sans-serif; font-size:14px; padding:10px 12px;
  }
  .field textarea{min-height:80px; resize:vertical; font-family:inherit;}
  .field input:focus, .field textarea:focus{outline:none; border-color:var(--amber-dim);}
  .btn{
    font-family:'JetBrains Mono', monospace; font-size:13px; padding:10px 20px;
    border:1px solid var(--amber); color:var(--amber); border-radius:var(--radius); transition:background .15s, color .15s;
  }
  .btn:hover{background:var(--amber); color:#0b0a08;}

  .comment{border:1px solid var(--border); border-radius:var(--radius); background:var(--panel); padding:16px 20px; margin-bottom:12px;}
  .comment-top{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px; gap:12px;}
  .comment-author{font-weight:600; font-size:14px; color:var(--text);}
  .comment-meta{display:flex; align-items:center; gap:12px;}
  .comment-date{font-size:11.5px; color:var(--dim);}
  .comment-delete{font-family:'JetBrains Mono', monospace; font-size:11px; color:var(--dim);}
  .comment-delete:hover{color:var(--red);}
  .comment-text{font-size:14.5px; color:var(--muted); white-space:pre-wrap;}
  .empty{color:var(--dim); font-size:14px; padding:16px 0;}

  footer{padding:28px 0 48px; font-size:12px; color:var(--dim); display:flex; justify-content:space-between; max-width:820px; margin:0 auto; padding-left:24px; padding-right:24px;}

  @media (max-width:720px){
    .nav ul{display:none;}
    h1{font-size:30px;}
    .reactions{flex-wrap:wrap;}
    .react-hint{margin-left:0; width:100%;}
  }
</style>
</head>

<header>

    <div class="prompt mono"><span class="path">~/</span>palestine</div>
    <ul class="mono">

<script>
/* ============================================================
   PROJECT CONTENT
   ============================================================ */
const projects = {
  coresoc: {
    title: "CoreSOC",
    subtitle: "A SOC / SIEM analyzer platform built from the ground up in Rust, Go, and React.",
    tags: ["Rust", "Go", "Nuxt 3", "ClickHouse", "Sigma", "MITRE ATT&CK"],
    body: [
      "CoreSOC is a full security-operations monorepo — the kind of platform a SOC team",
      "would actually run alert triage on, not a toy dashboard. It started from a capability",
      "map covering ingestion, detection, storage, correlation, and access control, and got",
      "built outward from there.",
      "",
      "## architecture",
      "",
      "The backend splits work between **Rust** and **Go**: Rust handles the",
      "performance-critical detection path — Sigma rule matching against incoming events —",
      "while Go drives ingestion pipelines, service orchestration, and the API layer. Data",
      "lands in a tiered store: hot events in ClickHouse for fast querying, colder data",
      "rolled into Parquet for cheap long-term retention.",
      "",
      "```yaml",
      "title: Suspicious PowerShell Encoded Command",
      "logsource:",
      "  category: process_creation",
      "  product: windows",
      "detection:",
      "  selection:",
      "    Image|endswith: '\\\\powershell.exe'",
      "    CommandLine|contains: '-EncodedCommand'",
      "  condition: selection",
      "level: high",
      "tags:",
      "  - attack.execution",
      "  - attack.t1059.001",
      "```",
      "",
      "Every match gets tagged against **MITRE ATT&CK**, so triage analysts see technique",
      "IDs alongside the raw alert instead of just a rule name.",
      "",
      "## the frontend",
      "",
      "The UI is a Nuxt 3 / Vue app with a dark navy-purple design system, built around four",
      "surfaces: a live security dashboard, a Sigma rules editor, a data-ingestion pipeline",
      "view, and an investigation triage view where alerts get correlated into cases.",
      "",
      "## access control",
      "",
      "RBAC is baked in from the schema up — analysts, rule authors, and admins see",
      "different slices of the same data, which matters once more than one team is looking",
      "at the same alert stream.",
      "",
      "## where it's headed",
      "",
      "Next up is deeper alert correlation — grouping related detections into a single",
      "case automatically instead of leaving that stitching to the analyst."
    ].join("\n")
  },
  oreon: {
    title: "Oreon",
    subtitle: "Peer-to-peer messaging over Bluetooth and Wi-Fi — no central server required.",
    tags: ["Flutter", "Android", "Bluetooth", "Wi-Fi mesh", "security"],
    body: [
      "Oreon is a messaging app that doesn't need the internet, or a server, to work. Two",
      "phones in range of each other can find one another and exchange messages directly",
      "over **Bluetooth** or **Wi-Fi**, with the app picking whichever transport is",
      "available.",
      "",
      "## transport layer",
      "",
      "Peer discovery and message routing sit on top of both BLE and Wi-Fi mesh",
      "networking, so the app keeps working in places a normal chat app wouldn't — no",
      "signal, no problem, as long as another device is nearby.",
      "",
      "```dart",
      "class ChatSocket {",
      "  static ChatSocket? _instance;",
      "  StreamController<Message>? _controller;",
      "",
      "  static ChatSocket get instance => _instance ??= ChatSocket._();",
      "  ChatSocket._();",
      "",
      "  void dispose() {",
      "    _controller?.close();",
      "    _controller = null;",
      "  }",
      "}",
      "```",
      "",
      "One of the gnarlier bugs along the way was in the WebSocket chat service used for",
      "the local relay layer — a singleton with a lifecycle that didn't match how Flutter",
      "widgets get disposed. That surfaced as stream-controller-after-dispose crashes and",
      "type-cast errors under specific reconnect timing. Fixing it meant tightening the",
      "singleton's lifecycle and being explicit about when streams get closed versus",
      "reused.",
      "",
      "## hardening",
      "",
      "The AndroidManifest went through several hardening passes for the BLE/Wi-Fi mesh",
      "permissions: TLS enforcement on any socket that touches the network, explicit",
      "service exports instead of implicit ones, and locked-down data extraction rules so",
      "backups can't leak message history.",
      "",
      "## why it matters",
      "",
      "Most messaging apps assume a server is always reachable. Oreon assumes the",
      "opposite — that the network you actually have is the phones around you."
    ].join("\n")
  },
  waas: {
    title: "WaaS Platform",
    subtitle: "A Go-based Website-as-a-Service backend — provision a customized site per tenant.",
    tags: ["Go", "Docker", "Nginx", "JWT", "Redis"],
    body: [
      "The WaaS platform is a backend for spinning up hosted websites per customer —",
      "think \"describe a site, get a working subdomain\" — built entirely in **Go**.",
      "",
      "## routing & isolation",
      "",
      "Each tenant gets its own subdomain, routed through **Nginx** in front of",
      "Dockerized backend instances. That keeps tenants isolated at the container level",
      "while sharing the same deployment pipeline.",
      "",
      "```go",
      "func (h *SiteHandler) CreateSite(w http.ResponseWriter, r *http.Request) {",
      "\tvar req CreateSiteRequest",
      "\tif err := json.NewDecoder(r.Body).Decode(&req); err != nil {",
      "\t\trespondError(w, http.StatusBadRequest, \"invalid request body\")",
      "\t\treturn",
      "\t}",
      "\tsite, err := h.service.Provision(r.Context(), req)",
      "\tif err != nil {",
      "\t\trespondError(w, http.StatusInternalServerError, err.Error())",
      "\t\treturn",
      "\t}",
      "\trespondJSON(w, http.StatusCreated, site)",
      "}",
      "```",
      "",
      "## customization tiers",
      "",
      "Sites support three tiers of customization, from basic template swaps up to fuller",
      "control over layout and content — enough range to serve very different customers",
      "off the same core engine.",
      "",
      "## auth & performance",
      "",
      "Access is **JWT**-based, and **Redis** sits in front of anything read-heavy so",
      "repeated requests for the same site config don't hit the database every time.",
      "",
      "## cleanup pass",
      "",
      "A later pass went through every handler and brought JSON encoding/decoding in line",
      "with the patterns from the official Go blog — small thing, but it made the codebase",
      "far more predictable to extend."
    ].join("\n")
  }
};

/* ============================================================
   MARKDOWN RENDERING (same renderer as blog.html)
   ============================================================ */
const renderer = new marked.Renderer();
renderer.code = function(codeOrToken, infostring){
  let code, lang;
  if(codeOrToken && typeof codeOrToken === "object"){
    code = codeOrToken.text;
    lang = codeOrToken.lang;
  } else {
    code = codeOrToken;
    lang = infostring;
  }
  lang = (lang || "").trim().split(/\s+/)[0];
  let highlighted, label;
  try{
    if(lang && hljs.getLanguage(lang)){
      highlighted = hljs.highlight(code, { language: lang }).value;
      label = lang;
    } else {
      const auto = hljs.highlightAuto(code);
      highlighted = auto.value;
      label = auto.language || "text";
    }
  }catch(e){
    highlighted = code.replace(/&/g,"&amp;").replace(/</g,"&lt;");
    label = lang || "text";
  }
  const id = "code-" + Math.random().toString(36).slice(2, 9);
  return '<div class="code-block">'
    + '<div class="code-head"><span class="code-lang mono">' + label + '</span>'
    + '<button class="copy-btn mono" onclick="copyCode(\'' + id + '\', this)">copy</button></div>'
    + '<pre><code id="' + id + '" class="hljs">' + highlighted + '</code></pre>'
    + '</div>';
};
marked.setOptions({ renderer, breaks: false, gfm: true });

function copyCode(id, btn){
  const el = document.getElementById(id);
  if(!el) return;
  navigator.clipboard.writeText(el.textContent).then(() => {
    const original = btn.textContent;
    btn.textContent = "copied!";
    btn.classList.add("copied");
    setTimeout(() => { btn.textContent = original; btn.classList.remove("copied"); }, 1400);
  });
}

/* ============================================================
   STATE (per project slug, in localStorage)
   ============================================================ */
function reactKey(slug){ return "palestine_project_reactions_" + slug; }
function commentKey(slug){ return "palestine_project_comments_" + slug; }

function loadReactions(slug){
  try{
    const raw = localStorage.getItem(reactKey(slug));
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return { likes: 0, dislikes: 0, vote: null };
}
function saveReactions(slug, data){ localStorage.setItem(reactKey(slug), JSON.stringify(data)); }

function loadComments(slug){
  try{
    const raw = localStorage.getItem(commentKey(slug));
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return [];
}
function saveComments(slug, list){ localStorage.setItem(commentKey(slug), JSON.stringify(list)); }

/* ============================================================
   RENDER
   ============================================================ */
let currentSlug = null;

function renderReactions(){
  const data = loadReactions(currentSlug);
  document.getElementById("likeCount").textContent = data.likes;
  document.getElementById("dislikeCount").textContent = data.dislikes;
  document.getElementById("likeBtn").classList.toggle("active", data.vote === "like");
  document.getElementById("dislikeBtn").classList.toggle("active", data.vote === "dislike");
}

function timeAgo(iso){
  const diff = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(diff / 60000);
  if(mins < 1) return "just now";
  if(mins < 60) return mins + "m ago";
  const hrs = Math.floor(mins / 60);
  if(hrs < 24) return hrs + "h ago";
  const days = Math.floor(hrs / 24);
  return days + "d ago";
}

function escapeHtml(str){
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function renderComments(){
  const list = loadComments(currentSlug).sort((a,b) => new Date(b.date) - new Date(a.date));
  document.getElementById("commentCount").textContent = list.length ? ("(" + list.length + ")") : "";
  const container = document.getElementById("commentList");
  if(list.length === 0){
    container.innerHTML = '<p class="empty mono">// no comments yet — be the first</p>';
    return;
  }
  container.innerHTML = list.map(c => (
    '<div class="comment">'
      + '<div class="comment-top">'
        + '<span class="comment-author">' + escapeHtml(c.name) + '</span>'
        + '<div class="comment-meta">'
          + '<span class="comment-date mono">' + timeAgo(c.date) + '</span>'
          + '<button class="comment-delete mono" data-id="' + c.id + '">delete</button>'
        + '</div>'
      + '</div>'
      + '<div class="comment-text">' + escapeHtml(c.text) + '</div>'
    + '</div>'
  )).join('');
}

/* ============================================================
   EVENTS
   ============================================================ */
document.getElementById("likeBtn").addEventListener("click", () => {
  const data = loadReactions(currentSlug);
  if(data.vote === "like"){ data.likes--; data.vote = null; }
  else{
    if(data.vote === "dislike") data.dislikes--;
    data.likes++; data.vote = "like";
  }
  saveReactions(currentSlug, data);
  renderReactions();
});

document.getElementById("dislikeBtn").addEventListener("click", () => {
  const data = loadReactions(currentSlug);
  if(data.vote === "dislike"){ data.dislikes--; data.vote = null; }
  else{
    if(data.vote === "like") data.likes--;
    data.dislikes++; data.vote = "dislike";
  }
  saveReactions(currentSlug, data);
  renderReactions();
});

document.getElementById("commentForm").addEventListener("submit", (e) => {
  e.preventDefault();
  const name = document.getElementById("cName").value.trim();
  const text = document.getElementById("cText").value.trim();
  if(!name || !text) return;
  const list = loadComments(currentSlug);
  list.push({ id: Date.now().toString(36) + Math.random().toString(36).slice(2,6), name, text, date: new Date().toISOString() });
  saveComments(currentSlug, list);
  document.getElementById("cText").value = "";
  renderComments();
});

document.getElementById("commentList").addEventListener("click", (e) => {
  const btn = e.target.closest("button[data-id]");
  if(!btn) return;
  if(!confirm("Delete this comment?")) return;
  const list = loadComments(currentSlug).filter(c => c.id !== btn.dataset.id);
  saveComments(currentSlug, list);
  renderComments();
});

/* ============================================================
   ROUTER
   ============================================================ */
function loadProject(){
  const slug = location.hash.replace("#", "") || "coresoc";
  const proj = projects[slug];
  if(!proj){
    document.getElementById("projTitle").textContent = "project not found";
    document.getElementById("projBody").innerHTML = "<p>That project doesn't exist. <a href=\"portfolio.html#work\">Back to work →</a></p>";
    return;
  }
  currentSlug = slug;
  document.getElementById("projEyebrow").textContent = "// cat ~/work/" + slug + ".md";
  document.getElementById("projTitle").textContent = proj.title;
  document.getElementById("projSubtitle").textContent = proj.subtitle;
  document.getElementById("projTags").innerHTML = proj.tags.map(t => "<span>" + t + "</span>").join("");
  document.getElementById("projBody").innerHTML = marked.parse(proj.body);
  document.title = proj.title + " — palestine";
  renderReactions();
  renderComments();
  window.scrollTo(0,0);
}

window.addEventListener("hashchange", loadProject);
loadProject();
</script>

</body>
