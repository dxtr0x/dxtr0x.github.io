<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>blog — palestine</title>
<meta name="description" content="notes on systems programming, security tooling, and building from scratch.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
<style>
  :root{
    --bg:#0b0a08;
    --panel:#151109;
    --panel-2:#1c1710;
    --border:#2c2417;
    --text:#f2e9d8;
    --muted:#948a76;
    --dim:#5f5747;
    --amber:#ffb454;
    --amber-dim:#a67733;
    --teal:#7fdbca;
    --radius:2px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--bg); color:var(--text);
    font-family:'Space Grotesk', sans-serif; line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }
  ::selection{background:var(--amber); color:#0b0a08;}
  .mono{font-family:'JetBrains Mono', monospace;}
  a{color:inherit; text-decoration:none;}
  ::-webkit-scrollbar{width:10px;}
  ::-webkit-scrollbar-track{background:var(--bg);}
  ::-webkit-scrollbar-thumb{background:var(--panel-2); border:1px solid var(--border);}
  body::before{
    content:""; position:fixed; inset:0; pointer-events:none; z-index:1;
    background-image: repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0px, rgba(255,255,255,0.012) 1px, transparent 1px, transparent 3px);
    mix-blend-mode:overlay;
  }
  .wrap{max-width:820px; margin:0 auto; padding:0 24px;}

  header{position:sticky; top:0; z-index:10; background:rgba(11,10,8,0.88); backdrop-filter:blur(8px); border-bottom:1px solid var(--border);}
  .nav{display:flex; align-items:center; justify-content:space-between; padding:16px 24px; max-width:820px; margin:0 auto;}
  .nav .prompt{font-size:14px; color:var(--amber);}
  .nav .prompt .path{color:var(--muted);}
  .nav ul{list-style:none; display:flex; gap:22px; font-size:13px;}
  .nav ul a{color:var(--muted); transition:color .15s;}
  .nav ul a:hover{color:var(--amber);}
  .nav ul a::before{content:"./"; color:var(--dim);}

  .page-head{padding:64px 0 40px;}
  .eyebrow{font-size:13px; color:var(--teal); letter-spacing:.04em; margin-bottom:14px;}
  h1{font-size:44px; font-weight:700; letter-spacing:-.02em; margin-bottom:14px;}
  .lede{font-size:16px; color:var(--muted); max-width:520px;}

  /* ---- list view ---- */
  #listView{padding-bottom:80px;}
  .post-card{
    display:block; border:1px solid var(--border); border-radius:var(--radius); background:var(--panel);
    padding:24px 26px; margin-bottom:14px; transition:border-color .15s, transform .15s;
  }
  .post-card:hover{border-color:var(--amber-dim); transform:translateX(3px);}
  .post-meta{font-size:12px; color:var(--dim); margin-bottom:8px;}
  .post-meta .sep{margin:0 8px;}
  .post-card h2{font-size:20px; font-weight:600; margin-bottom:8px;}
  .post-card:hover h2{color:var(--amber);}
  .post-card p{font-size:14.5px; color:var(--muted); max-width:600px;}
  .tags{display:flex; gap:8px; flex-wrap:wrap; margin-top:14px;}
  .tags span{font-size:11.5px; color:var(--dim); border:1px solid var(--border); padding:3px 9px; border-radius:20px;}
  .empty{color:var(--dim); font-size:14px; padding:20px 0;}

  /* ---- post view ---- */
  #postView{display:none; padding-bottom:100px;}
  .back{display:inline-block; font-size:13px; color:var(--muted); margin:40px 0 28px;}
  .back:hover{color:var(--amber);}
  .post-header{border-bottom:1px solid var(--border); padding-bottom:28px; margin-bottom:32px;}
  .post-header h1{font-size:36px;}
  article{font-size:16px; color:var(--text);}
  article h1, article h2, article h3{color:var(--amber); font-weight:600; margin:32px 0 14px; letter-spacing:-.01em;}
  article h1{font-size:26px;} article h2{font-size:21px;} article h3{font-size:18px;}
  article p{color:var(--text); opacity:.92; margin-bottom:16px; max-width:680px;}
  article a{color:var(--teal); border-bottom:1px solid var(--teal);}
  article ul, article ol{margin:0 0 16px 22px; opacity:.92;}
  article li{margin-bottom:6px;}
  article blockquote{
    border-left:2px solid var(--amber-dim); margin:20px 0; padding:6px 20px;
    color:var(--muted); font-style:italic;
  }
  article code{
    font-family:'JetBrains Mono', monospace; font-size:13.5px; background:var(--panel-2);
    border:1px solid var(--border); border-radius:3px; padding:2px 6px; color:var(--teal);
  }
  article pre{
    background:var(--panel); border:1px solid var(--border); border-radius:var(--radius);
    padding:18px 20px; overflow-x:auto; margin:20px 0;
  }
  article pre code{background:none; border:none; padding:0; color:var(--text); font-size:13.5px;}
  article hr{border:none; border-top:1px solid var(--border); margin:32px 0;}
  article img{max-width:100%; border:1px solid var(--border); border-radius:var(--radius);}

  footer{padding:28px 0 48px; font-size:12px; color:var(--dim); display:flex; justify-content:space-between; max-width:820px; margin:0 auto; padding-left:24px; padding-right:24px;}

  @media (max-width:720px){
    .nav ul{display:none;}
    h1{font-size:32px;}
  }
  @media (prefers-reduced-motion: reduce){ *{animation:none !important; transition:none !important;} }
</style>
</head>
<body>

<header>
  <div class="nav">
    <div class="prompt mono"><span class="path">~/</span>palestine</div>
    <ul class="mono">
      <li><a href="portfolio.html#about">about</a></li>
      <li><a href="portfolio.html#work">work</a></li>
      <li><a href="blog.html">blog</a></li>
      <li><a href="portfolio.html#contact">contact</a></li>
    </ul>
  </div>
</header>

<main class="wrap">

  <!-- ================= LIST VIEW ================= -->
  <div id="listView">
    <div class="page-head">
      <div class="eyebrow mono">// cat ~/blog/*.md</div>
      <h1>blog</h1>
      <p class="lede">notes on systems programming, security tooling, and building things from scratch.</p>
    </div>
    <div id="postList"></div>
  </div>

  <!-- ================= POST VIEW ================= -->
  <div id="postView">
    <a href="#" class="back mono" id="backLink">&larr; back to all posts</a>
    <div class="post-header">
      <div class="eyebrow mono" id="postEyebrow"></div>
      <h1 id="postTitle"></h1>
      <div class="post-meta mono" id="postMeta"></div>
    </div>
    <article id="postBody"></article>
  </div>

</main>

<footer class="mono">
  <span>© 2026 palestine</span>
  <span>built from scratch</span>
</footer>

<script>
/* ============================================================
   POSTS
   Add a new post by pushing another object into this array.
   `body` is plain markdown — headings, lists, code fences,
   blockquotes, links, images all work.
   ============================================================ */
const posts = [
  {
    slug: "hello-world",
    title: "hello, world",
    date: "2026-07-20",
    tags: ["meta"],
    excerpt: "First post — why this blog exists and what I'll be writing about.",
    body: `Every project needs a first commit. This is that, for the blog.

I'll be writing mostly about **systems programming**, **security tooling**,
and whatever I break while building [CoreSOC](portfolio.html#work),
[Oreon](portfolio.html#work), and the rest.

## what to expect

- write-ups on kernel / low-level internals
- notes from building a SOC/SIEM platform from scratch
- the occasional post-mortem when something breaks in an interesting way

> Documenting the process is half the point — future me will thank present me.

More soon.`
  },
  {
    slug: "markdown-blog-from-scratch",
    title: "building this blog: markdown, no backend",
    date: "2026-07-20",
    tags: ["meta", "web"],
    excerpt: "How this page renders posts client-side from plain markdown, with zero build step.",
    body: `This page has no CMS, no build step, and no server. Posts live as plain
markdown strings right inside \`blog.html\`, and get rendered client-side with
[marked.js](https://marked.js.org/).

## why

- **zero dependencies to run** — open the file, it works
- **portable** — the whole blog is one HTML file
- **fast to write in** — just push a new object into the \`posts\` array

\`\`\`js
posts.push({
  slug: "my-new-post",
  title: "my new post",
  date: "2026-08-01",
  tags: ["notes"],
  excerpt: "one line summary shown on the list page",
  body: "# heading\\n\\nmarkdown content goes here."
});
\`\`\`

That's it — no rebuild, no deploy pipeline. Just markdown in, styled page out.`
  }
];

/* ============================================================ */

const listView = document.getElementById('listView');
const postView = document.getElementById('postView');
const postList = document.getElementById('postList');

function fmtDate(iso){
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
}

function renderList(){
  const sorted = [...posts].sort((a,b) => new Date(b.date) - new Date(a.date));
  if(sorted.length === 0){
    postList.innerHTML = '<p class="empty mono">// no posts yet</p>';
    return;
  }
  postList.innerHTML = sorted.map((p, i) => `
    <a class="post-card" href="#post/${p.slug}">
      <div class="post-meta">${String(i).padStart(2,'0')}<span class="sep">·</span>${fmtDate(p.date)}</div>
      <h2>${p.title}</h2>
      <p>${p.excerpt}</p>
      <div class="tags mono">${p.tags.map(t => `<span>${t}</span>`).join('')}</div>
    </a>
  `).join('');
}

function renderPost(slug){
  const post = posts.find(p => p.slug === slug);
  if(!post){ location.hash = ''; return; }
  document.getElementById('postEyebrow').textContent = `// cat ~/blog/${post.slug}.md`;
  document.getElementById('postTitle').textContent = post.title;
  document.getElementById('postMeta').textContent = `${fmtDate(post.date)}  ·  ${post.tags.join(', ')}`;
  document.getElementById('postBody').innerHTML = marked.parse(post.body);
  document.title = `${post.title} — palestine`;
}

function route(){
  const hash = location.hash;
  if(hash.startsWith('#post/')){
    const slug = hash.replace('#post/', '');
    listView.style.display = 'none';
    postView.style.display = 'block';
    renderPost(slug);
    window.scrollTo(0,0);
  } else {
    listView.style.display = 'block';
    postView.style.display = 'none';
    document.title = 'blog — palestine';
  }
}

window.addEventListener('hashchange', route);
renderList();
route();
</script>

</body>
</html>
